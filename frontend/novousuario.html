<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Criar Conta - SaaS IoT</title>
  <style>
    body { font-family: Arial; display: flex; height: 100vh; justify-content: center; align-items: center; }
    .signup-container { width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
    input { width: 100%; padding: 8px; margin: 5px 0; }
    button { width: 100%; padding: 8px; margin-top: 10px; }
    .error { color: red; }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Criar Conta</h2>
    <input type="text" id="full_name" placeholder="Nome completo" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Senha" required>
    <button onclick="signUp()">Criar Conta</button>
    <p class="error" id="error-msg"></p>
  </div>

  <script>
    async function signUp() {
      const full_name = document.getElementById("full_name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error-msg");

      try {
        const res = await fetch("https://SEU_BACKEND/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ full_name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error;
          return;
        }

        alert("Conta criada com sucesso! Faça login.");
        window.location.href = "login.html";

      } catch (err) {
        errorMsg.textContent = "Erro de conexão com o servidor.";
      }
    }
  </script>
</body>
</html>
